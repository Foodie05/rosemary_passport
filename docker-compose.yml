services:
  postgres:
    image: postgres:16
    container_name: rosm-passport-postgres
    environment:
      POSTGRES_USER: rosm_passport
      POSTGRES_PASSWORD: rosm_passport_dev
      POSTGRES_DB: rosm_passport
    ports:
      - "5432:5432"
    volumes:
      - ./ops/postgres/init:/docker-entrypoint-initdb.d:ro
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rosm_passport -d rosm_passport"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
