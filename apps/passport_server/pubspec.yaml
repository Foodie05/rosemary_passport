name: rosm_passport_server
description: ROSM Passport - Secure SSO server powered by Dart Frog.
version: 0.1.0
publish_to: none

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  dart_frog: ^1.1.0
  dart_frog_auth: ^1.1.0
  dotenv: ^4.2.0
  postgres: ^3.3.0
  jose: ^0.3.4
  uuid: ^4.5.1
  crypto: ^3.0.3
  collection: ^1.18.0
  dart_jsonwebtoken: ^2.14.1
  argon2: ^1.0.1
  http: ^1.2.1
  mailer: ^6.4.1
  meta: ^1.12.0
  json_annotation: ^4.11.0

dev_dependencies:
  build_runner: ^2.4.13
  dart_frog_cli: ^1.2.6
  json_serializable: ^6.8.0
  very_good_analysis: ^6.0.0
