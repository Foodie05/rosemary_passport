name: rosm_passport_flutter
description: Flutter SDK for native ROSM Passport sign-in with OIDC and PKCE.
version: 0.5.6
publish_to: none

environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  crypto: ^3.0.3
  flutter:
    sdk: flutter
  flutter_secure_storage: ^9.2.2
  http: ^1.2.1
  json_annotation: ^4.12.0
  passkeys: ^2.21.1

dev_dependencies:
  build_runner: ^2.4.13
  flutter_test:
    sdk: flutter
  json_serializable: ^6.8.0
  lints: ^5.0.0
